services:
  staging-db:
    image: postgres:16-alpine
    container_name: pushlog-staging-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${STAGING_DB_NAME:-pushlog_staging}
      POSTGRES_USER: ${STAGING_DB_USER:-pushlog}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?Set STAGING_DB_PASSWORD in .env.staging}
    volumes:
      - pushlog_staging_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pushlog -d pushlog_staging"]
      interval: 10s
      timeout: 5s
      retries: 10

  staging-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
        SENTRY_ORG: ${SENTRY_ORG}
        SENTRY_PROJECT: ${SENTRY_PROJECT}
    container_name: pushlog-staging-app
    restart: unless-stopped
    depends_on:
      staging-db:
        condition: service_healthy
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      APP_ENV: staging
      PORT: "3001"
      DATABASE_URL: postgresql://${STAGING_DB_USER:-pushlog}:${STAGING_DB_PASSWORD}@staging-db:5432/${STAGING_DB_NAME:-pushlog_staging}
      APP_URL: https://staging.pushlog.ai
      COOKIE_DOMAIN: staging.pushlog.ai
      INCIDENT_ENGINE_BIN: /app/bin/incident-engine
      # GitHub: set GITHUB_OAUTH_CLIENT_ID + GITHUB_OAUTH_CLIENT_SECRET in .env.staging (PushLog DEV app)
      # Email: set EMAIL_ENABLED=true and SMTP_USER/SMTP_PASS (and optional SMTP_HOST/SMTP_FROM) in .env.staging to send invite/verification emails
      SLACK_NOTIFICATIONS_ENABLED: "false"
      BILLING_ENABLED: "false"
    ports:
      # Host 3002 → container 3001 (avoids conflict with PM2 pushlog-staging on 3001).
      # If using Docker for staging, point nginx proxy_pass to 127.0.0.1:3002.
      - "127.0.0.1:3002:3001"

volumes:
  pushlog_staging_db_data:
