services:
  staging-db:
    image: postgres:16-alpine
    container_name: pushlog-staging-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${STAGING_DB_NAME:-pushlog_staging}
      POSTGRES_USER: ${STAGING_DB_USER:-pushlog}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?Set STAGING_DB_PASSWORD in .env.staging}
    volumes:
      - pushlog_staging_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pushlog -d pushlog_staging"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pushlog

  staging-streaming-stats:
    build:
      context: .
      dockerfile: Dockerfile.streaming-stats
    container_name: pushlog-staging-streaming-stats
    restart: unless-stopped
    depends_on:
      staging-db:
        condition: service_healthy
    env_file:
      - .env.staging
    environment:
      PORT: "5004"
      STREAMING_STATS_LISTEN_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://${STAGING_DB_USER:-pushlog}:${STAGING_DB_PASSWORD}@staging-db:5432/${STAGING_DB_NAME:-pushlog_staging}
    networks:
      - pushlog
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5004/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  staging-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
        SENTRY_ORG: ${SENTRY_ORG}
        SENTRY_PROJECT: ${SENTRY_PROJECT}
        CACHEBUST: ${CACHEBUST:-unknown}
    container_name: pushlog-staging-app
    restart: unless-stopped
    depends_on:
      staging-db:
        condition: service_healthy
      staging-streaming-stats:
        condition: service_healthy
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      APP_ENV: staging
      PORT: "3001"
      DATABASE_URL: postgresql://${STAGING_DB_USER:-pushlog}:${STAGING_DB_PASSWORD}@staging-db:5432/${STAGING_DB_NAME:-pushlog_staging}
      APP_URL: https://staging.pushlog.ai
      COOKIE_DOMAIN: staging.pushlog.ai
      INCIDENT_ENGINE_BIN: /app/bin/incident-engine
      RISK_ENGINE_BIN: /app/bin/risk-engine
      STATS_ENGINE_URL: http://staging-streaming-stats:5004
      SLACK_NOTIFICATIONS_ENABLED: "false"
      # Disables checkout/portal only; subscription renewal dates still sync from Stripe for Settings UI.
      BILLING_ENABLED: "false"
      PROMOTE_PROD_WEBHOOK_URL: "http://pushlog-promote:3999"
    ports:
      - "127.0.0.1:3002:3001"
    networks:
      - pushlog

networks:
  pushlog:
    name: pushlog
    driver: bridge

volumes:
  pushlog_staging_db_data:
