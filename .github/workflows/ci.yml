# CI checks: validate code is good before staging.
# Runs on push/PR to main. No deploys—only checks.
# Staging deploy is manual (Actions → Deploy to Staging → Run workflow).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Build
        run: npm run build

  risk-engine:
    name: Risk engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run risk-engine tests
        run: cargo test -p risk-engine
      - name: Build risk-engine release
        run: cargo build -p risk-engine --release

  streaming-stats:
    name: Streaming stats build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build streaming-stats
        run: cargo build --release -p streaming-stats

  incident-engine:
    name: Incident engine build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Build incident-engine
        run: cargo build --release -p incident-engine
