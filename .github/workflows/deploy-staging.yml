# Deploy to staging EC2 — manual only. No auto-deploy.
# Run from Actions tab → Deploy to Staging → Run workflow after CI checks pass.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   STAGING_EC2_HOST     — EC2 hostname or IP
#   STAGING_EC2_SSH_KEY  — Private key for ec2-user
#
# Optional: SENTRY_AUTH_TOKEN, STAGING_EC2_REPO_PATH

name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 (fetch, merge, build, docker up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          timeout: 10m
          command_timeout: 60m
          debug: true
          script: |
            set -e
            echo "[1/5] Resolving repo path..."
            REPO_PATH="${{ secrets.STAGING_EC2_REPO_PATH }}"
            [ -z "$REPO_PATH" ] && REPO_PATH=/home/ec2-user/pushlog
            cd "$REPO_PATH" && echo "  cd $REPO_PATH OK"
            echo "[2/5] git fetch origin && git merge origin/main"
            git fetch origin && git merge origin/main
            echo "[3/5] ./scripts/build-for-docker.sh (this can take 10–20 min)..."
            export SENTRY_ORG=pushlog
            export SENTRY_PROJECT=pushlog
            export SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}"
            export SENTRY_RELEASE="$(git rev-parse HEAD)"
            export VITE_SENTRY_RELEASE="$SENTRY_RELEASE"
            if [ -z "$SENTRY_AUTH_TOKEN" ]; then echo "  WARNING: SENTRY_AUTH_TOKEN is not set — source maps will NOT be uploaded to Sentry (add repo secret SENTRY_AUTH_TOKEN to fix)"; else echo "  SENTRY_AUTH_TOKEN is set — plugin will upload source maps"; fi
            ./scripts/build-for-docker.sh
            echo "[4/6] docker compose up -d --build..."
            export CACHEBUST="$(git rev-parse HEAD)"
            docker compose -f docker-compose.staging.yml -f docker-compose.prebuilt.yml up -d --build
            echo "[5/6] Writing staging deploy metadata..."
            echo "$CACHEBUST" > "$REPO_PATH/.staging_deployed_sha"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > "$REPO_PATH/.staging_deployed_at"
            echo "[6/6] Done. Staging deployed SHA: $CACHEBUST"
