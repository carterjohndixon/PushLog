# Security checks on every push/PR to main (and weekly).
# - CodeQL: static analysis for many CWE / OWASP-style issues in JS/TS
# - Gitleaks (CLI): secret patterns in git history + working tree (OSS; avoids gitleaks-action v2 org license)
# - Semgrep: OWASP Top 10 + language rules (good signal for contributors)
# - npm audit: known vulnerable dependencies (root + carter.pushlog.ai)
# - Trivy: CVEs from lockfiles + misconfig (IaC) + secret leak patterns in repo
# - cargo audit: Rust advisory DB for workspace crates
#
# Failing jobs block merges if your branch protection requires this workflow.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly in case new advisories land without a code change
    - cron: "0 6 * * 1"

permissions:
  contents: read

# Use Node 24 for JavaScript-based actions (checkout, setup-node, cache inside composite actions).
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  codeql:
    name: CodeQL (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Extra security queries beyond the default suite (more OWASP/CWE coverage)
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep (OWASP + TS/JS)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/javascript \
            --error \
            .

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Root — npm ci & audit
        run: |
          npm ci
          npm audit --audit-level=high

      - name: carter.pushlog.ai — npm ci & audit
        working-directory: carter.pushlog.ai
        run: |
          npm ci
          npm audit --audit-level=high

  trivy:
    name: Trivy (deps + misconfig + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          # Composite action pins actions/cache@… on Node 20; disabling avoids that step + deprecation noise.
          cache: "false"
          skip-dirs: node_modules,dist,target,.git,carter.pushlog.ai/node_modules,carter.pushlog.ai/dist
          scanners: vuln,misconfig,secret

  cargo-audit:
    name: cargo audit (Rust workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit workspace crates
        run: cargo audit
