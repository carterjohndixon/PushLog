# Security checks on every push/PR to main (and weekly).
# - CodeQL: static analysis for many CWE / OWASP-style issues in JS/TS
# - Semgrep: OWASP Top 10 + language rules (good signal for contributors)
# - npm audit: known vulnerable dependencies (root + carter.pushlog.ai)
# - Trivy: CVEs from lockfiles + optional secret leak patterns in repo
# - cargo audit: Rust advisory DB for workspace crates
#
# Failing jobs block merges if your branch protection requires this workflow.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly in case new advisories land without a code change
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extra security queries beyond the default suite (more OWASP/CWE coverage)
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep (OWASP + TS/JS)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/javascript \
            --error \
            .

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Root — npm ci & audit
        run: |
          npm ci
          npm audit --audit-level=high

      - name: carter.pushlog.ai — npm ci & audit
        working-directory: carter.pushlog.ai
        run: |
          npm ci
          npm audit --audit-level=high

  trivy:
    name: Trivy (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          skip-dirs: node_modules,dist,target,.git,carter.pushlog.ai/node_modules,carter.pushlog.ai/dist
          scanners: vuln,secret

  cargo-audit:
    name: cargo audit (Rust workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit workspace crates
        run: cargo audit
