# PushLog agent — production host (Docker stack)
#
# 1) In PushLog UI: Settings → Agents → create agent, copy token (plg_...).
# 2) Replace token below. Rebuild/restart pushlog-agent after edits:
#    docker compose ... up -d --build pushlog-agent
#
# Each `type: docker` entry runs: docker logs -f --tail 0 <container>
# Parser still classifies lines; min_severity decides what gets shipped.
#
# min_severity: warning | error | critical (default in agent if omitted: warning)
#   critical — only fatal/panic/critical keyword lines (state-breaking; developer must look)
#   error    — error + critical
#   warning  — warning + error + critical
#
# noise_preset:
#   - generic (default) — for customer application logs; does not filter PushLog-internal lines.
#   - pushlog_api — use when tailing PushLog's own API/worker containers (filters [incident-engine], GitHub token check noise, etc.).
noise_preset: pushlog_api
min_severity: critical

endpoint: https://pushlog.ai
token: plg_replace_with_real_agent_token
environment: production
service: pushlog-docker-host

sources:
  # --- Production stack (same host) ---
  - type: docker
    container: pushlog-prod-web
  - type: docker
    container: pushlog-prod-streaming-stats

  # --- Staging stack (if it runs on this server) ---
  - type: docker
    container: pushlog-staging-app
  - type: docker
    container: pushlog-staging-streaming-stats

  # --- Optional: promote service / DB (noisy; comment out if unwanted) ---
  # - type: docker
  #   container: pushlog-promote
  # - type: docker
  #   container: pushlog-staging-db

spool_dir: /var/lib/pushlog-agent/spool
