# Promote service — handles staging → production promotion when using Docker.
# Run with production: docker compose -f docker-compose.production.yml -f docker-compose.promote.yml up -d
# Or standalone: docker compose -f docker-compose.promote.yml up -d
#
# Requires PROMOTE_PROD_WEBHOOK_SECRET in .env.production (or env).
# Staging's .env.staging needs:
#   PROMOTE_PROD_WEBHOOK_URL=http://172.17.0.1:3999
#   PROMOTE_PROD_WEBHOOK_SECRET=<same secret>
#
# From inside staging container, 172.17.0.1 is the Docker bridge gateway to the host.
# Ensure port 3999 is not exposed to the internet (firewall/nginx).

services:
  pushlog-promote:
    build:
      context: .
      dockerfile: Dockerfile.promote
    container_name: pushlog-promote
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PROMOTE_HTTP_PORT: "3999"
      PROMOTE_WORKSPACE: /workspace
      # PROMOTE_PROD_WEBHOOK_SECRET comes from env_file: .env.production
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    ports:
      # Bind to all interfaces so staging container can reach via 172.17.0.1:3999
      - "3999:3999"
    # Optional: use host network if 172.17.0.1 doesn't work (e.g. some Docker setups)
    # network_mode: host
