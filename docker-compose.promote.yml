# Promote service — handles staging → production promotion when using Docker.
# Run with production: docker compose -f docker-compose.production.yml -f docker-compose.promote.yml up -d
# Or standalone: docker compose -f docker-compose.promote.yml up -d
#
# Requires PROMOTE_PROD_WEBHOOK_SECRET in .env.production (or env).
# The staging-app container reaches this service by container name (pushlog-promote)
# on the shared "pushlog" Docker network.

services:
  pushlog-promote:
    build:
      context: .
      dockerfile: Dockerfile.promote
    container_name: pushlog-promote
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PROMOTE_HTTP_PORT: "3999"
      PROMOTE_WORKSPACE: /workspace
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    ports:
      - "127.0.0.1:3999:3999"
    networks:
      - pushlog

networks:
  pushlog:
    name: pushlog
    external: true
