# Promote service — handles staging → production promotion when using Docker.
# Run with production: docker compose -f docker-compose.production.yml -f docker-compose.promote.yml up -d
# Or standalone: docker compose -f docker-compose.promote.yml up -d
#
# Requires PROMOTE_PROD_WEBHOOK_SECRET in .env.production (or env).
# The staging-app container reaches this service by container name (pushlog-promote)
# on the shared "pushlog" Docker network.

services:
  pushlog-promote:
    build:
      context: .
      dockerfile: Dockerfile.promote
    container_name: pushlog-promote
    # Dockerfile runs as `app` (non-root). The bind mount `.:/workspace` usually matches *host* ownership
    # (often root). Without this, writes to `.promote-production.lock` and logs fail with EACCES.
    # Alternative: on the host, `chown -R $(docker exec pushlog-promote id -u):$(docker exec pushlog-promote id -g) /path/to/repo`
    user: "0:0"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PROMOTE_HTTP_PORT: "3999"
      PROMOTE_WORKSPACE: /workspace
      # COMPOSE_PROJECT_NAME, DOCKER_PROMOTE_PRUNE: set in .env.production (env_file) so values aren’t lost to host-shell compose interpolation.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    ports:
      - "127.0.0.1:3999:3999"
    networks:
      - pushlog

# Same network as docker-compose.staging.yml so `compose -f staging -f promote` merges cleanly.
# (external: true prevented one-command staging+promote and left promote easy to forget to rebuild.)
networks:
  pushlog:
    name: pushlog
    driver: bridge
