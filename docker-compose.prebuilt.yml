# Override: use pre-built context from scripts/build-for-docker.sh
# Usage: CACHEBUST=$(git rev-parse HEAD) docker compose -f docker-compose.staging.yml -f docker-compose.prebuilt.yml up -d --build
services:
  staging-app:
    build:
      context: .docker-build/prebuilt
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-unknown}
