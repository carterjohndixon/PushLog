services:
  # Rust HTTP service: pre-aggregates push stats for fast dashboards (replaces PM2 streaming-stats-prod).
  prod-streaming-stats:
    build:
      context: .
      dockerfile: Dockerfile.streaming-stats
    container_name: pushlog-prod-streaming-stats
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "5004"
      STREAMING_STATS_LISTEN_HOST: "0.0.0.0"
    networks:
      - pushlog_prod
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5004/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    # If DATABASE_SSL_CA_PATH in .env.production points to a host file, mount it at the same path:
    # volumes:
    #   - ./config/supabase-db.crt:/app/config/supabase-db.crt:ro

  pushlog-prod-web:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    container_name: pushlog-prod-web
    restart: unless-stopped
    depends_on:
      prod-streaming-stats:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: "3000"
      INCIDENT_ENGINE_BIN: /app/bin/incident-engine
      RISK_ENGINE_BIN: /app/bin/risk-engine
      STATS_ENGINE_URL: http://prod-streaming-stats:5004
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - pushlog_prod
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Match prod-streaming-stats if you use a custom DB CA:
    # volumes:
    #   - ./config/supabase-db.crt:/app/config/supabase-db.crt:ro

  pushlog-agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        # Set at build time so `pushlog-agent version` shows a real SHA, e.g. GIT_COMMIT=$(git rev-parse --short HEAD)
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: pushlog-agent
    restart: unless-stopped
    depends_on:
      pushlog-prod-web:
        condition: service_healthy
    # Root is required for default docker.sock permissions (root:docker on the host).
    # Config and spool are still explicit mounts; only the agent binary runs with elevated in-container uid.
    user: "0:0"
    command: ["run", "--config", "/etc/pushlog-agent/config.yaml"]
    volumes:
      - ./config/pushlog-agent.production.yaml:/etc/pushlog-agent/config.yaml:ro
      - pushlog_agent_spool:/var/lib/pushlog-agent/spool
      # Required for `type: docker` sources in agent config (docker logs -f <container>).
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pushlog_prod
    healthcheck:
      test: ["CMD-SHELL", "pidof pushlog-agent >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

# Shared prod network — create once: `docker network create pushlog_prod`
# (promote-production-docker.sh creates it if missing). external: true avoids
# "network exists but was not created for project …" when compose project names differ.
networks:
  pushlog_prod:
    external: true

volumes:
  pushlog_agent_spool:
